name: Build macOS Application

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Cython setuptools customtkinter faster-whisper Pillow ffpyplayer pyjwt torch torchvision torchaudio ctranslate2

    - name: Create core binaries with Cython
      run: |
        python setup_cython.py build_ext --inplace
        echo "✅ Cython compilation successful"
        # Rimuoviamo i sorgenti originali per sicurezza (opzionale nel bundle PyInstaller)
        # find core -name "*.py" -delete

    - name: Download Whisper Models
      run: |
        mkdir -p model_cache/whisper
        python -c "
        from huggingface_hub import snapshot_download
        import os
        models = ['tiny']
        for m in models:
            print(f'Downloading {m}...')
            snapshot_download(
                repo_id=f'systran/faster-whisper-{m}',
                local_dir=f'model_cache/whisper/{m}',
                local_dir_use_symlinks=False
            )
        "
        echo "✅ Models downloaded successfully"

    - name: Build with PyInstaller
      run: |
        # Creiamo un'icona icns fittizia se non esiste per evitare errori di build
        if [ ! -f assets/icon.icns ]; then
          mkdir -p assets
          cp assets/icon.ico assets/icon.icns || touch assets/icon.icns
        fi
        python -m PyInstaller vocius_persona_macos.spec --noconfirm

    - name: Compress App Bundle
      run: |
        cd dist
        zip -r "Vocius_Persona_macOS.zip" "Vocius Persona.app"

    - name: Create DMG Disk Image
      run: |
        hdiutil create -volname "Vocius Persona" -srcfolder "dist/Vocius Persona.app" -ov -format UDZO "dist/Vocius-Persona.dmg"
        echo "✅ DMG created successfully"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vocius-Persona-macOS
        path: |
          dist/Vocius-Persona.dmg
        retention-days: 5

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        files: dist/Vocius-Persona.dmg
        name: Vocius Persona Mac Latest
        tag_name: latest
        body: "Automated build of Vocius Persona for macOS."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
